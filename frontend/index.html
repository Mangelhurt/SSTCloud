<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-center">
    <div class="card login-card">
      <div class="login-logo">
        <h1>Mi Perfil</h1>
        <p>Ingresa a tu cuenta para continuar</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">
          Iniciar sesión
        </button>

        <div id="login-error" class="alert"></div>
      </form>

      <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)">
        Demo: <strong>demo@example.com</strong> / <strong>demo1234</strong>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
